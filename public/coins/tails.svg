<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="coinPurple" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
    <radialGradient id="shine2" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#EDE9FE" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EDE9FE" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000066"/>
    </filter>
  </defs>
  <!-- Coin body -->
  <circle cx="50" cy="50" r="46" fill="#3B1F78" filter="url(#shadow2)"/>
  <circle cx="50" cy="50" r="44" fill="url(#coinPurple)"/>
  <!-- Rim -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#C084FC" stroke-width="2.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#4C1D95" stroke-width="1" opacity="0.4"/>
  <!-- Diamond shape -->
  <g transform="translate(50,50)">
    <!-- Big diamond -->
    <polygon points="0,-20 14,0 0,16 -14,0" fill="#FFD700" opacity="0.95"/>
    <polygon points="0,-20 14,0 0,4" fill="#FFF176" opacity="0.7"/>
    <!-- Inner facets -->
    <polygon points="0,-20 14,0 0,4" fill="#FFE566" opacity="0.5"/>
    <polygon points="0,-20 -14,0 0,4" fill="#F5C518" opacity="0.3"/>
    <!-- Small stars around diamond -->
    <text x="-22" y="-12" font-size="8" fill="#FFD700" opacity="0.9">★</text>
    <text x="14" y="-12" font-size="8" fill="#FFD700" opacity="0.9">★</text>
    <text x="-5" y="26" font-size="8" fill="#FFD700" opacity="0.9">★</text>
    <!-- Sparkle dots -->
    <circle cx="-18" cy="8" r="1.5" fill="#EDE9FE" opacity="0.8"/>
    <circle cx="20" cy="8" r="1.5" fill="#EDE9FE" opacity="0.8"/>
    <circle cx="0" cy="-24" r="1.5" fill="#EDE9FE" opacity="0.8"/>
  </g>
  <!-- Shine overlay -->
  <circle cx="50" cy="50" r="44" fill="url(#shine2)"/>
</svg>
